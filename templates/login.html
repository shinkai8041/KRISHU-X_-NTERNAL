<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KRISHU X INTERNAL - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0000 100%);
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: rgba(17, 17, 17, 0.9);
            border: 2px solid #ff0000;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(15px);
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.3);
        }
        .login-box h2 {
            text-align: center;
            color: #ff0000;
            margin-bottom: 30px;
            font-size: 28px;
            text-shadow: 0 0 10px #ff0000;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #ccc; }
        .form-group input {
            width: 100%;
            padding: 14px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #ff0000;
            border-radius: 10px;
            color: white;
            font-size: 15px;
            transition: 0.3s;
        }
        .form-group input:focus {
            border-color: #ff4444;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
            outline: none;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            color: white;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover {
            background: linear-gradient(135deg, #ff3333, #ff0000);
            transform: scale(1.02);
        }
        .error-message {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #ff0000;
            color: #ff0000;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🔥 KRISHU X INTERNAL</h2>
        
        {% if error %}
        <div class="error-message">{{ error }}</div>
        {% endif %}
        
        <form method="POST" action="/">
            <div class="form-group">
                <label>Username</label>
                <input name="username" type="text" required autocomplete="off" placeholder="Enter username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input name="password" type="password" required placeholder="Enter password">
            </div>
            <button class="btn" type="submit">Login</button>
        </form>
        <div class="footer">KRISHU X INTERNAL PRO v2.0</div>
    </div>
</body>
</html>
